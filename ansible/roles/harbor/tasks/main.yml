---
- name: Set kubeconfig path
  ansible.builtin.set_fact:
    kubeconfig: "{{ kubeconfig }}"
    harbor_values: "{{ playbook_dir }}/../manifests/harbor/{{ 'values-low.yaml' if (low_memory_mode | default(false)) else 'values.yaml' }}"
    harbor_chart_dir: "{{ lookup('env', 'HARBOR_CHART_DIR') | default('/tmp/harbor-helm', true) }}"

- name: Create harbor namespace
  ansible.builtin.command: kubectl create namespace harbor
  environment:
    KUBECONFIG: "{{ kubeconfig }}"
  register: harbor_ns
  failed_when: harbor_ns.rc != 0 and 'AlreadyExists' not in harbor_ns.stderr
  changed_when: harbor_ns.rc == 0

- name: Enable Istio injection on harbor namespace
  ansible.builtin.command: kubectl label namespace harbor istio-injection=enabled --overwrite
  environment:
    KUBECONFIG: "{{ kubeconfig }}"
  changed_when: false

- name: Prefetch Harbor Helm chart from GitHub
  ansible.builtin.command: "{{ playbook_dir }}/../scripts/prefetch-harbor-chart.sh"
  environment:
    HARBOR_CHART_DIR: "{{ harbor_chart_dir }}"
  changed_when: false

- name: Install Harbor from local chart
  ansible.builtin.command: >
    helm upgrade --install harbor {{ harbor_chart_dir }}
    --namespace harbor
    --values {{ harbor_values }}
    --wait --timeout 20m
  environment:
    KUBECONFIG: "{{ kubeconfig }}"
  register: harbor_install
  until: harbor_install.rc == 0
  retries: 2
  delay: 30
  changed_when: "'has been upgraded' in harbor_install.stdout or 'deployed' in harbor_install.stdout"

- name: Wait for harbor core
  ansible.builtin.command: kubectl -n harbor rollout status deploy/harbor-core --timeout=600s
  environment:
    KUBECONFIG: "{{ kubeconfig }}"
  changed_when: false

- name: Wait for harbor registry
  ansible.builtin.command: kubectl -n harbor wait --for=condition=ready pod -l component=registry --timeout=600s
  environment:
    KUBECONFIG: "{{ kubeconfig }}"
  changed_when: false

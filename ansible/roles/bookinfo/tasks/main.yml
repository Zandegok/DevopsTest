---
- name: Set kubeconfig path
  ansible.builtin.set_fact:
    kubeconfig: "{{ kubeconfig }}"

- name: Deploy Bookinfo application
  ansible.builtin.command: >
    kubectl apply -f
    https://raw.githubusercontent.com/istio/istio/{{ bookinfo_version }}/samples/bookinfo/platform/kube/bookinfo.yaml
  environment:
    KUBECONFIG: "{{ kubeconfig }}"
  register: bookinfo_apply
  changed_when: "'created' in bookinfo_apply.stdout or 'configured' in bookinfo_apply.stdout"

- name: Deploy Bookinfo Gateway and VirtualService (k3s/NodePort uses Gateway port 80)
  ansible.builtin.command: >
    kubectl apply -f {{ playbook_dir }}/../manifests/bookinfo/gateway.yaml
    -f {{ playbook_dir }}/../manifests/bookinfo/destination-rules.yaml
  environment:
    KUBECONFIG: "{{ kubeconfig }}"
  register: gateway_apply
  changed_when: "'created' in gateway_apply.stdout or 'configured' in gateway_apply.stdout"

- name: Wait for productpage deployment
  ansible.builtin.command: kubectl rollout status deploy/productpage-v1 --timeout=300s
  environment:
    KUBECONFIG: "{{ kubeconfig }}"
  changed_when: false

- name: Wait for reviews deployment
  ansible.builtin.command: kubectl rollout status deploy/reviews-v2 --timeout=300s
  environment:
    KUBECONFIG: "{{ kubeconfig }}"
  changed_when: false

- name: Wait for ratings deployment
  ansible.builtin.command: kubectl rollout status deploy/ratings-v1 --timeout=300s
  environment:
    KUBECONFIG: "{{ kubeconfig }}"
  changed_when: false

- name: Wait for details deployment
  ansible.builtin.command: kubectl rollout status deploy/details-v1 --timeout=300s
  environment:
    KUBECONFIG: "{{ kubeconfig }}"
  changed_when: false

- name: Restart bookinfo pods to pick up sidecars
  ansible.builtin.command: kubectl rollout restart deploy/productpage-v1 deploy/reviews-v1 deploy/reviews-v2 deploy/reviews-v3 deploy/ratings-v1 deploy/details-v1
  environment:
    KUBECONFIG: "{{ kubeconfig }}"
  changed_when: false
  failed_when: false

- name: Wait for productpage after restart
  ansible.builtin.command: kubectl rollout status deploy/productpage-v1 --timeout=300s
  environment:
    KUBECONFIG: "{{ kubeconfig }}"
  changed_when: false

- name: Verify Bookinfo ingress routing
  ansible.builtin.command: "{{ playbook_dir }}/../scripts/fix-bookinfo-ingress.sh"
  environment:
    KUBECONFIG: "{{ kubeconfig }}"
  changed_when: false

---
- name: Set kubeconfig path
  ansible.builtin.set_fact:
    kubeconfig: "{{ kubeconfig }}"

- name: Check if istioctl exists
  ansible.builtin.stat:
    path: /usr/local/bin/istioctl
  register: istioctl_bin

- name: Prefetch Istio CLI with retries
  ansible.builtin.command: "{{ playbook_dir }}/../scripts/prefetch-istio.sh"
  environment:
    ISTIO_VERSION: "{{ istio_version }}"
  when: not istioctl_bin.stat.exists

- name: Verify istioctl installed
  ansible.builtin.stat:
    path: /usr/local/bin/istioctl
  register: istioctl_bin_after
  failed_when: not istioctl_bin_after.stat.exists

- name: Check if Istio is installed
  ansible.builtin.command: kubectl get ns istio-system
  environment:
    KUBECONFIG: "{{ kubeconfig }}"
  register: istio_ns
  failed_when: false
  changed_when: false

- name: Install Istio demo profile (low memory)
  ansible.builtin.shell: |
    istioctl install --set profile=demo -y \
      --set values.gateways.istio-ingressgateway.type=NodePort \
      --set values.global.proxy.resources.requests.memory=64Mi \
      --set values.global.proxy.resources.limits.memory=128Mi \
      --set values.pilot.resources.requests.memory=128Mi \
      --set values.pilot.resources.limits.memory=256Mi
  environment:
    KUBECONFIG: "{{ kubeconfig }}"
  when:
    - istio_ns.rc != 0
    - low_memory_mode | default(false)

- name: Install Istio demo profile
  ansible.builtin.command: >
    istioctl install --set profile=demo -y
    --set values.gateways.istio-ingressgateway.type=NodePort
  environment:
    KUBECONFIG: "{{ kubeconfig }}"
  when:
    - istio_ns.rc != 0
    - not (low_memory_mode | default(false))

- name: Wait for istiod
  ansible.builtin.command: kubectl -n istio-system rollout status deploy/istiod --timeout=300s
  environment:
    KUBECONFIG: "{{ kubeconfig }}"
  changed_when: false

- name: Wait for ingress gateway
  ansible.builtin.command: kubectl -n istio-system rollout status deploy/istio-ingressgateway --timeout=300s
  environment:
    KUBECONFIG: "{{ kubeconfig }}"
  changed_when: false

- name: Enable Istio injection on default namespace
  ansible.builtin.command: kubectl label namespace default istio-injection=enabled --overwrite
  environment:
    KUBECONFIG: "{{ kubeconfig }}"
  changed_when: false

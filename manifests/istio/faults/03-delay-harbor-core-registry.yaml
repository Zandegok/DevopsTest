apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: chaos-delay-harbor-core-registry
  namespace: harbor
spec:
  hosts:
    - harbor-registry
  http:
    - match:
        - port: 5000
      fault:
        delay:
          percentage:
            value: 100
          fixedDelay: 5s
      route:
        - destination:
            host: harbor-registry
            port:
              number: 5000

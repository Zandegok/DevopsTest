grafana:
  enabled: true
  service:
    type: NodePort
    nodePort: 30300
  adminPassword: prom-operator
  resources:
    requests:
      memory: 64Mi
      cpu: 25m
    limits:
      memory: 128Mi

prometheus:
  enabled: true
  prometheusSpec:
    retention: 6h
    resources:
      requests:
        memory: 128Mi
        cpu: 50m
      limits:
        memory: 256Mi

prometheusOperator:
  resources:
    requests:
      memory: 64Mi
      cpu: 25m
    limits:
      memory: 128Mi

alertmanager:
  enabled: false

kubeStateMetrics:
  enabled: false

nodeExporter:
  enabled: false

defaultRules:
  create: false

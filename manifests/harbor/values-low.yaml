expose:
  type: nodePort
  tls:
    enabled: false

externalURL: http://127.0.0.1

harborAdminPassword: Harbor12345

persistence:
  enabled: true
  persistentVolumeClaim:
    registry:
      size: 2Gi
    jobservice:
      size: 1Gi
    database:
      size: 1Gi
    redis:
      size: 1Gi

portal:
  replicas: 1
  resources:
    requests:
      memory: 64Mi
      cpu: 25m
    limits:
      memory: 128Mi

core:
  replicas: 1
  resources:
    requests:
      memory: 128Mi
      cpu: 50m
    limits:
      memory: 256Mi

jobservice:
  replicas: 1
  resources:
    requests:
      memory: 64Mi
      cpu: 25m
    limits:
      memory: 128Mi

registry:
  replicas: 1
  resources:
    requests:
      memory: 128Mi
      cpu: 50m
    limits:
      memory: 256Mi

trivy:
  enabled: false

database:
  type: internal
  internal:
    resources:
      requests:
        memory: 128Mi
        cpu: 50m
      limits:
        memory: 256Mi

redis:
  type: internal
  internal:
    resources:
      requests:
        memory: 64Mi
        cpu: 25m
      limits:
        memory: 128Mi

metrics:
  enabled: false
